# =====================================================
# TikTok (国际版) Quantumult X 去广告配置
# 更新时间: 2026-07-24
# 策略: DNS 级域名 REJECT + URL-REGEX 精准拦截
# =====================================================
# 
# TikTok 与抖音的区别:
# - 抖音: 中国版，使用穿山甲(Pangolin) SDK 国内域名
# - TikTok: 国际版，使用 Pangle (穿山甲国际版) SDK，域名体系完全不同
# 
# ⚠️ 不能拦截的核心域名（拦截后 TikTok 无法使用）:
#   tiktok.com (主站), tiktokv.com (API), tiktokcdn.com/us (CDN),
#   tiktokd.net/org (基础设施), muscdn.com / musical.ly (历史域名),
#   byteoversea.com (核心 API), ibytedtos.com (CDN), bytedapm.com (APM)
# 

# ============================================================
# 1. Pangle SDK 广告核心域名 (强力推荐)
# TikTok 大部分应用内广告通过 Pangle SDK 加载，拦截后广告空白
# ============================================================
host-suffix, pangle.io, reject
host-suffix, pangle-b.io, reject
host-suffix, pangleglobal.com, reject
host-suffix, pangle-ads.com, reject
host-suffix, tiktokpangle-b.us, reject
host-suffix, tiktokpangle.us, reject
host-suffix, tiktokpangle-cdn-us.com, reject
host-word, pangolin-dsp-toutiao, reject
host-word, pangolin-sdk-toutiao, reject
host-suffix, pangolinbutlerlounge.com, reject
host-word, pglstatp-toutiao, reject

# ============================================================
# 2. TikTok Ads Platform (广告投放平台 API)
# 纯广告 API，REJECT 不影响刷视频
# ============================================================
host-suffix, ads.tiktok.com, reject
host-suffix, ads-sg.tiktok.com, reject
host-suffix, ads-api.tiktok.com, reject
host-suffix, business-api.tiktok.com, reject
host-suffix, business-api.tiktokw.us, reject
host-suffix, ads.tiktokw.us, reject
host-suffix, ads.us.tiktok.com, reject
host-suffix, ads-ie.tiktokw.eu, reject
host-suffix, ads-ttp2.tiktokw.eu, reject

# ============================================================
# 3. Analytics / Tracking (用户行为追踪与广告归因)
# ============================================================
host-suffix, analytics.tiktok.com, reject
host-suffix, analytics-sg.tiktok.com, reject
host-suffix, analytics.tiktokw.us, reject
host-suffix, analytics-ipv6.tiktokw.us, reject
host-suffix, analytics.us.tiktok.com, reject
host-suffix, analytics-ie.tiktokw.eu, reject
host-suffix, analytics-ttp2.tiktokw.eu, reject

# ============================================================
# 4. 广告数据上报 MCS/TNC/XLOG (可选拦截)
# 拦截后不影响功能，可减小后台流量
# ============================================================
host-suffix, mcs.tiktokw.us, reject
host-suffix, mcs.tiktokv.us, reject
host-suffix, log.tiktokv.com, reject
host-suffix, log-va.tiktokv.com, reject
host-suffix, xlog.tiktokv.com, reject
host-suffix, xlog-va.tiktokv.com, reject
host-suffix, mon.tiktokv.com, reject
host-suffix, mon.us.tiktokv.com, reject
host-suffix, rtlog.tiktokv.com, reject
host-suffix, rtc-logger-va.tiktokv.com, reject
host-suffix, tnc.tiktokv.com, reject

# ============================================================
# 5. URL-REGEX 精准拦截
# 针对走通用 API 的广告请求进行路径级拦截
# ============================================================
URL-REGEX,^https?:\/\/[^\/]*\.tiktokv\.com\/.*\/ad\/,REJECT
URL-REGEX,^https?:\/\/[^\/]*\.tiktok\.com\/.*\/ad\/,REJECT
URL-REGEX,^https?:\/\/api.*\.byteoversea\.com\/.*\/pangle\/,REJECT

# ============================================================
# 6. 开屏广告 (Splash Ad)
# ============================================================
URL-REGEX,^https?:\/\/[^\/]*\.tiktokv\.com\/.*\/splash\/,REJECT
URL-REGEX,^https?:\/\/[^\/]*\.tiktok\.com\/.*\/splash\/,REJECT
